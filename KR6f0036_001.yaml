body:
  text: 僧祐録云失譯今附西晉録佛在羅閲祇國耆闍崛山中與菩薩萬人俱比丘僧千二百五十人諸優婆塞優婆夷諸天王梵釋及人民鬼神龍無央數共坐阿闍世王太子名為和休與長者子五百人各持金花繖蓋從羅閲國出行與太子相隨俱到佛所各持繖蓋上佛已各叉手頭面著地為佛作禮却住佛前太子叉手白佛言菩薩何因緣得端正何因緣不入女人腹中而生蓮花中何因緣知前世宿命願佛加大恩當為我分別説之佛告太子菩薩忍辱不瞋怒者後世生為人端正菩薩不淫姪不與女人交通者後世生不入女人腹中便於蓮華中化生菩薩喜持經戒教人後世生便自知宿命無央數世之事太子白佛言何因緣菩薩有三十二相何因緣有八十種好何因緣人民見佛身形視之無厭極佛告太子本為菩薩時好布施與人在所求索欲得衣服飲食金銀珍寶車馬奴婢妻子肌肉頭目皆不逆人無所貪惜用是故得三十二相菩薩慈心哀念人民蜎飛蠕動之類如視赤子欲念度脫用是故得八十種好菩薩見怨家如視父母其心適等無有異用是故人民見佛身形視之無厭極太子白佛言何因緣菩薩知深經智慧何因緣知三昧安隱何因緣佛所語皆使人聞者皆歡喜耶佛告太子菩薩喜書經諷誦學説用是故知深經智慧菩薩常好定意心安用是故得三昧安隱菩薩所語皆至誠不欺怠人用是故所語誠信人聞者皆歡喜太子白佛言何因緣菩薩身所行口所言心所念皆淨潔何因緣魔不能得其便何因緣衆人不敢誹謗佛經道不敢誹謗比丘僧佛告太子菩薩喜侍佛喜經道喜比丘僧用是故得淨潔菩薩晝夜經行精進用是故魔不能得其便菩薩所語皆至誠不欺用是故人民不敢誹謗佛經道不敢誹謗比丘僧太子白佛言何因緣菩薩得壽命長何因緣得無病何因緣家中皆和順相重不令他人別離佛告太子菩薩慈心不殺生用是故後生得壽命長菩薩不持刀杖恐怖人用是故後世生得無病菩薩見人有鬪變喜行救解令和合用是故後世生人不別離太子白佛言何因緣菩薩易得財物富有不難何因緣不亡財物人不劫盜何因緣得尊者豪貴耶佛告太子菩薩智黠不愚癡用是故得大富不難菩薩喜布施不貪惜餘者不亡財物見人富樂得錢財不嫉妬用是故得為尊者菩薩不殺不自貢高用是故得為豪貴太子白佛言何因緣菩薩得天眼洞視何因緣天耳徹聽何因緣得知世間生死所趣善惡耶佛告太子菩薩喜於佛寺中然燈用是故得天眼洞視菩薩喜持倡伎樂佛寺中用是故天耳徹聽菩薩入三昧得禪用是故知世間生死所趣善惡太子白佛言何因緣菩薩得飛行四神足念何因緣菩薩得念前世無央數劫之事何因緣菩薩得佛便絶命佛告太子菩薩布施持車馬象及與騾驢駱駝履屣與人用是故得飛行四神足菩薩喜念諸佛三昧神足從學喜教人用是故得念前世無央數劫之事菩薩得佛意無所著用是故便般泥洹絶命太子白佛言菩薩何因緣預治佛國何因緣預知照十方佛告太子菩薩常多願用是故預治佛國菩薩布施與人民喜教人行六波羅蜜經用是故後得比丘僧菩薩持七寶物作繖蓋上佛及佛寺用是故得光明遍照十方佛為太子分別説是事太子甚大歡喜及五百長者子皆大歡喜太子白佛言我後世佛所説我悉受行皆當具足佛大笑口中五色光出悉照十方彌勒菩薩起前長跪叉手白佛言佛不妄笑何因緣五色光出悉照十方耶佛告彌勒菩薩聽我説之太子和休及五百長者子前世供養百億佛皆行菩薩道乃前世提和竭羅佛時是五百人皆我弟子所教後世悉當得共會供養六億佛却後一劫劫名為摩訶波羅蜜共會一劫中五百人前後皆同一字名為若那頸頭陀那後作佛時其國土當如阿彌陀佛國國中菩薩往來飛行者變化者皆如阿彌陀佛國中諸菩薩人聞是經皆當生阿彌陀佛國作菩薩如文殊師利菩薩三摩提鉢菩薩後世作佛者當如阿彌陀佛説經已太子和休及五百長者子諸菩薩比丘僧比丘尼優婆塞優婆夷諸天梵人民鬼神龍皆大歡喜前為佛作禮而去
